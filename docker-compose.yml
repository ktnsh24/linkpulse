# docker-compose.yml — Local development with Azurite (Azure Storage emulator)
# Usage: docker-compose up -d azurite
# This gives you Table Storage, Queue, and Blob locally — no Azure costs.

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: linkpulse-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"

  app:
    build: .
    container_name: linkpulse-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - BASE_URL=http://localhost:8000
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://azurite:10002/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    depends_on:
      - azurite

volumes:
  azurite_data:


